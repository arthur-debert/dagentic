name: Bug
description: Something is broken
labels: ["{{bug}}", "{{needs_plan}}", "{{flow_full}}"]
body:
  - type: textarea
    id: broken
    attributes:
      label: What's broken
      description: Describe the incorrect behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How to trigger this bug
      value: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Environment, logs, related issues
    validations:
      required: false
