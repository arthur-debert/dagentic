name: Epic
description: Large piece of work requiring multiple PRs
labels: ["epic", "needs-plan"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this epic delivers when complete
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why now, what problem it solves
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Rough scope
      description: >-
        Your initial sense of what's involved — agent will refine during
        planning
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints / invariants
      description: >-
        Things that must remain true throughout (e.g., "no user-visible changes
        until final phase")
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: Criteria for epic completion
      value: |
        - [ ] All phases merged to feature branch
        - [ ] Feature branch merged to main
        - [ ] Tests passing
    validations:
      required: true
  - type: markdown
    attributes:
      value: "---\n*Agent will fill in the phase table below during planning.*"
