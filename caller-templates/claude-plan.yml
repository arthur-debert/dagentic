# Copy to .github/workflows/claude-plan.yml in your repo.

name: Claude Planning

on:
  issues:
    types: [labeled]

jobs:
  plan:
    if: >-
      github.event.label.name == 'status: needs-plan'
      && github.actor != 'github-actions[bot]'
      && github.actor != 'claude[bot]'
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    uses: arthur-debert/dagentic/.github/workflows/plan.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
